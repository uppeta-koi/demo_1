<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分子级靶向透视互动实验室 - Demo</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(400%); }
        }
        .animate-scan { animation: scanline 3s linear infinite; }
        
        @keyframes ripple-wash {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0.8; border: 4px solid #fff; }
            100% { transform: translate(-50%, -50%) scale(4); opacity: 0; border: 1px solid #06b6d4; }
        }
        .ripple-effect {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: ripple-wash 1.5s infinite ease-out;
        }

        @keyframes particle-suck {
            0% { transform: translate(var(--start-x), var(--start-y)) scale(0); opacity: 0; }
            50% { opacity: 1; transform: translate(calc(var(--start-x) * 0.5), calc(var(--start-y) * 0.5)) scale(1.2); }
            100% { transform: translate(0, 0) scale(0); opacity: 0; }
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #22d3ee;
            border-radius: 50%;
            animation: particle-suck 1s infinite ease-in;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const Icon = ({ name, size = 24, ...props }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} {...props}></i>;
        };

        const App = () => {
            const [step, setStep] = useState(0);
            const [stream, setStream] = useState(null);
            const [capturedImage, setCapturedImage] = useState(null);
            const [targetPoint, setTargetPoint] = useState({ x: 50, y: 50 });
            const [cleaningProgress, setCleaningProgress] = useState(0);
            const [error, setError] = useState(null);
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const fileInputRef = useRef(null);

            const businessScenarios = [
                { title: "专业旗舰款", srp: 88.0, cost: 26.4, margin: "70%", color: "blue", desc: "高利润引流单品", tag: "HOT" },
                { title: "家庭量贩组", srp: 199.0, cost: 89.5, margin: "55%", color: "cyan", desc: "稳定现金流组合", tag: "VALUE" },
                { title: "环保浓缩装", srp: 42.0, cost: 10.5, margin: "75%", color: "indigo", desc: "高复购率核心", tag: "PROFIT" }
            ];

            useEffect(() => {
                if (step === 1 && stream && videoRef.current) {
                    videoRef.current.srcObject = stream;
                }
                setTimeout(() => lucide.createIcons(), 100);
            }, [step, stream]);

            useEffect(() => {
                let timer;
                if (step === 3) {
                    setCleaningProgress(0);
                    timer = setInterval(() => {
                        setCleaningProgress(prev => {
                            if (prev >= 100) { clearInterval(timer); return 100; }
                            return prev + 1;
                        });
                    }, 35); 
                }
                return () => clearInterval(timer);
            }, [step]);

            const startCamera = async () => {
                setError(null);
                try {
                    const constraints = { video: { facingMode: { ideal: 'environment' } }, audio: false };
                    const mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                    setStream(mediaStream);
                    setStep(1);
                } catch (err) {
                    setError("无法启动相机。请确保在 HTTPS 环境下执行并授予权限。");
                }
            };

            const takePhoto = () => {
                const video = videoRef.current;
                const canvas = canvasRef.current;
                if (video && canvas) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    setCapturedImage(canvas.toDataURL('image/png'));
                    setStep(2);
                    if (stream) { stream.getTracks().forEach(track => track.stop()); setStream(null); }
                }
            };

            const reset = () => {
                if (stream) stream.getTracks().forEach(track => track.stop());
                setStep(0); setStream(null); setCapturedImage(null); setCleaningProgress(0); setError(null);
            };

            return (
                <div className="min-h-screen bg-slate-950 text-white font-sans flex flex-col items-center justify-center overflow-hidden">
                    <div className="fixed top-0 w-full p-4 bg-slate-950/80 backdrop-blur-md z-50 flex justify-between items-center border-b border-white/10">
                        <div className="flex items-center gap-3">
                            <div className="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center">
                                <i data-lucide="zap" className="text-white"></i>
                            </div>
                            <div>
                                <h1 className="text-sm font-black italic uppercase leading-none text-blue-400 tracking-tighter">ZONE 02 - AR LAB</h1>
                                <p className="text-[10px] font-bold text-white/50">MOLECULAR TARGETED LAB</p>
                            </div>
                        </div>
                        <div className="flex gap-1.5">
                            {[1, 2, 3, 4].map(i => (
                                <div key={i} className={`h-1.5 rounded-full transition-all duration-500 ${step >= i ? 'w-6 bg-blue-500' : 'w-2 bg-slate-800'}`} />
                            ))}
                        </div>
                    </div>

                    <main className="relative w-full max-w-md aspect-[9/16] bg-slate-900 shadow-2xl border-x border-slate-800 overflow-hidden">
                        {step === 0 && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center p-10 text-center space-y-10">
                                <div className="relative">
                                    <div className="absolute inset-0 bg-blue-500 blur-[80px] opacity-20 animate-pulse" />
                                    <div className="relative w-32 h-32 bg-slate-800 rounded-[2.5rem] border border-slate-700 flex items-center justify-center">
                                        <i data-lucide="camera" className="text-blue-400 w-16 h-16"></i>
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <h2 className="text-4xl font-black italic uppercase tracking-tighter leading-tight">靶向洗净<br/><span className="text-blue-500">视觉演示</span></h2>
                                    <p className="text-slate-400 text-sm px-6">锁定污渍分子链，通过专利生物酶技术现场模拟物理瓦解与消除过程</p>
                                </div>
                                {error && <div className="p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-xs flex items-center gap-2 text-left"><i data-lucide="alert-circle" size="16"></i>{error}</div>}
                                <div className="w-full space-y-3 px-4">
                                    <button onClick={startCamera} className="w-full py-5 bg-blue-600 rounded-2xl font-black text-xl shadow-xl shadow-blue-900/40">立即开启扫描仪</button>
                                    <button onClick={() => fileInputRef.current.click()} className="w-full py-4 bg-slate-800 border border-slate-700 rounded-2xl font-bold text-sm text-slate-300 flex items-center justify-center gap-2"><i data-lucide="upload" size="20"></i>载入分析样本</button>
                                </div>
                                <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={(e) => {
                                    const file = e.target.files[0];
                                    if (file) {
                                        const reader = new FileReader();
                                        reader.onload = (ev) => { setCapturedImage(ev.target.result); setStep(2); };
                                        reader.readAsDataURL(file);
                                    }
                                }} />
                            </div>
                        )}

                        {step === 1 && (
                            <div className="absolute inset-0 bg-black">
                                <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover opacity-90" />
                                <div className="absolute inset-0 pointer-events-none border-[60px] border-black/50">
                                    <div className="w-full h-full border-2 border-blue-400/30 relative">
                                        <div className="absolute inset-0 bg-gradient-to-b from-transparent via-blue-400/10 to-transparent h-1/4 animate-scan" />
                                    </div>
                                </div>
                                <div className="absolute bottom-16 w-full flex flex-col items-center gap-6 px-10">
                                    <button onClick={takePhoto} className="w-20 h-20 bg-white rounded-full border-[8px] border-slate-900 shadow-2xl flex items-center justify-center">
                                        <div className="w-16 h-16 rounded-full border-2 border-slate-300" />
                                    </button>
                                </div>
                            </div>
                        )}

                        {(step === 2 || step === 3) && (
                            <div className="absolute inset-0" onClick={(e) => {
                                if (step !== 2) return;
                                const rect = e.currentTarget.getBoundingClientRect();
                                setTargetPoint({
                                    x: ((e.clientX - rect.left) / rect.width) * 100,
                                    y: ((e.clientY - rect.top) / rect.height) * 100
                                });
                            }}>
                                <img src={capturedImage} className="absolute inset-0 w-full h-full object-cover brightness-[0.7] grayscale-[0.3]" />
                                <img src={capturedImage} className={`absolute inset-0 w-full h-full object-cover transition-all duration-1000 ${step === 3 ? 'brightness-125 saturate-[1.2]' : 'opacity-0'}`} 
                                    style={{ clipPath: step === 3 ? `circle(${cleaningProgress * 1.5}% at ${targetPoint.x}% ${targetPoint.y}%)` : 'circle(0% at 50% 50%)' }} />
                                
                                <div className="absolute -translate-x-1/2 -translate-y-1/2" style={{ left: `${targetPoint.x}%`, top: `${targetPoint.y}%` }}>
                                    <div className="w-20 h-20 border-2 border-white/40 rounded-full flex items-center justify-center">
                                        <div className="w-2 h-2 rounded-full bg-cyan-400" />
                                    </div>
                                    {step === 3 && cleaningProgress < 100 && (
                                        <>
                                            <div className="ripple-effect" style={{ width: '150px', height: '150px' }} />
                                            {[...Array(8)].map((_, i) => (
                                                <div key={i} className="particle" style={{ '--start-x': `${(Math.random()-0.5)*200}px`, '--start-y': `${(Math.random()-0.5)*200}px`, animationDelay: `${i*0.1}s` }} />
                                            ))}
                                        </>
                                    )}
                                </div>

                                <div className="absolute bottom-0 w-full p-10 bg-gradient-to-t from-slate-950 via-slate-950/80 to-transparent">
                                    {step === 2 ? (
                                        <div className="space-y-6">
                                            <div className="flex items-center gap-3 text-cyan-400 bg-cyan-400/10 p-3 rounded-xl border border-cyan-400/20">
                                                <i data-lucide="mouse-pointer-2"></i>
                                                <span className="font-bold text-sm">请点击污渍中心点进行靶向定位</span>
                                            </div>
                                            <button onClick={() => setStep(3)} className="w-full py-5 bg-cyan-500 text-slate-950 font-black rounded-2xl text-xl shadow-lg shadow-cyan-900/40">启动分子级瓦解</button>
                                        </div>
                                    ) : (
                                        <div className="space-y-6">
                                            <div className="flex justify-between items-end mb-1">
                                                <span className="font-black italic uppercase text-emerald-400">{cleaningProgress < 100 ? 'Eliminating Stains...' : '100% Fully Restored'}</span>
                                                <span className="font-mono text-3xl font-black text-white">{cleaningProgress}%</span>
                                            </div>
                                            <div className="w-full h-4 bg-slate-800/50 rounded-full overflow-hidden border border-white/10 p-1">
                                                <div className="h-full bg-gradient-to-r from-blue-600 via-cyan-400 to-emerald-400 rounded-full transition-all" style={{ width: `${cleaningProgress}%` }} />
                                            </div>
                                            {cleaningProgress >= 100 && (
                                                <button onClick={() => setStep(4)} className="w-full py-5 bg-white text-slate-950 font-black rounded-2xl text-xl animate-bounce mt-4 shadow-2xl">查看商机分析报告</button>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {step === 4 && (
                            <div className="absolute inset-0 bg-slate-950 p-6 flex flex-col overflow-y-auto">
                                <div className="mt-12 space-y-6 pb-28">
                                    <h2 className="text-3xl font-black italic text-blue-400 uppercase text-center">商业数据转换</h2>
                                    <div className="space-y-4">
                                        {businessScenarios.map((item, idx) => (
                                            <div key={idx} className="relative bg-slate-900 rounded-3xl border border-slate-800 p-6 space-y-4 shadow-2xl">
                                                <div className="absolute -top-3 -right-2 px-3 py-1 bg-blue-600 text-[9px] font-black rounded-lg shadow-lg rotate-3">{item.tag}</div>
                                                <div className="flex justify-between items-center border-b border-white/5 pb-4">
                                                    <span className="font-black uppercase text-white">{item.title}</span>
                                                    <span className="text-emerald-400 font-black text-sm">毛利额 {item.margin}</span>
                                                </div>
                                                <div className="flex justify-between items-end">
                                                    <div>
                                                        <p className="text-slate-500 text-[9px] uppercase font-bold">市场零售价</p>
                                                        <p className="text-3xl font-mono font-black text-blue-400">¥ {item.srp.toFixed(2)}</p>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-slate-500 text-[9px] uppercase font-bold">渠道进价</p>
                                                        <p className="text-xl font-mono font-bold text-slate-500 italic">¥ {item.cost.toFixed(2)}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={reset} className="flex items-center gap-2 text-slate-500 mx-auto text-sm font-bold py-4 hover:text-white"><i data-lucide="refresh-cw" size="14"></i>重新进行其他样本测试</button>
                                </div>
                                <div className="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-slate-950 to-transparent">
                                    <button className="w-full py-5 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl font-black text-xl shadow-blue-900/40">锁定专利配方 & 立即订购</button>
                                </div>
                            </div>
                        )}
                        <canvas ref={canvasRef} className="hidden" />
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
