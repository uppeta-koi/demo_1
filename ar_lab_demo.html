<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分子级靶向透视互动实验室 - Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&display=swap');

        * { box-sizing: border-box; }
        body { margin: 0; background: #020617; font-family: 'Syne', sans-serif; }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(500%); }
        }
        .animate-scan { animation: scanline 3s linear infinite; }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.15; }
            50% { opacity: 0.35; }
        }
        .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }

        @keyframes ripple-wash {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(4); opacity: 0; }
        }
        .ripple-effect {
            position: absolute;
            border-radius: 50%;
            border: 2px solid #06b6d4;
            pointer-events: none;
            animation: ripple-wash 1.5s infinite ease-out;
        }

        @keyframes particle-suck {
            0% { transform: translate(var(--sx), var(--sy)) scale(0); opacity: 0; }
            50% { opacity: 1; transform: translate(calc(var(--sx)*0.4), calc(var(--sy)*0.4)) scale(1.5); }
            100% { transform: translate(0,0) scale(0); opacity: 0; }
        }
        .particle {
            position: absolute;
            width: 5px; height: 5px;
            background: #22d3ee;
            border-radius: 50%;
            animation: particle-suck 1s infinite ease-in;
            left: 50%; top: 50%;
            margin: -2.5px;
        }

        @keyframes bounce-in {
            0% { transform: scale(0.8); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .bounce-in { animation: bounce-in 0.5s ease forwards; }

        @keyframes float-up {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .float-up { animation: float-up 0.6s ease forwards; }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #22d3ee, #34d399);
            border-radius: 9999px;
            transition: width 0.1s linear;
        }

        .mono { font-family: 'Space Mono', monospace; }

        video { width: 100%; height: 100%; object-fit: cover; }

        .scan-border {
            position: absolute; inset: 40px;
            border: 1.5px solid rgba(96,165,250,0.25);
        }
        .scan-bar {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent, rgba(96,165,250,0.12), transparent);
            height: 25%;
        }

        .corner {
            position: absolute;
            width: 18px; height: 18px;
            border-color: #60a5fa;
            border-style: solid;
        }
        .corner-tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
        .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
        .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

        button { cursor: pointer; border: none; font-family: inherit; }
        button:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
    const { useState, useRef, useEffect, createElement: h } = React;

    const businessScenarios = [
        { title: "专业旗舰款", srp: 88.0, cost: 26.4, margin: "70%", tag: "HOT", accent: "#3b82f6" },
        { title: "家庭量贩组", srp: 199.0, cost: 89.5, margin: "55%", tag: "VALUE", accent: "#06b6d4" },
        { title: "环保浓缩装", srp: 42.0, cost: 10.5, margin: "75%", tag: "PROFIT", accent: "#6366f1" }
    ];

    function StepWelcome({ onCamera, onFile, error, fileRef }) {
        return h('div', { style: { position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'2.5rem', textAlign:'center', gap:'2rem' } },
            h('div', { style: { position:'relative' } },
                h('div', { className:'animate-pulse-glow', style: { position:'absolute', inset:'-20px', background:'#3b82f6', filter:'blur(50px)', borderRadius:'50%' } }),
                h('div', { style: { position:'relative', width:120, height:120, background:'#0f172a', border:'1px solid #1e293b', borderRadius:28, display:'flex', alignItems:'center', justifyContent:'center' } },
                    h('svg', { width:56, height:56, viewBox:'0 0 24 24', fill:'none', stroke:'#60a5fa', strokeWidth:1.5, strokeLinecap:'round', strokeLinejoin:'round' },
                        h('path', { d:'M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z' }),
                        h('circle', { cx:12, cy:13, r:4 })
                    )
                )
            ),
            h('div', { style: { display:'flex', flexDirection:'column', gap:'0.75rem' } },
                h('h2', { style: { margin:0, fontSize:'2.4rem', fontWeight:800, lineHeight:1.1, textTransform:'uppercase', letterSpacing:'-0.03em', color:'#fff' } },
                    '靶向洗净', h('br'), h('span', { style:{color:'#3b82f6'} }, '视觉演示')
                ),
                h('p', { style: { margin:0, color:'#64748b', fontSize:'0.85rem', lineHeight:1.7 } },
                    '锁定污渍分子链，通过专利生物酶技术现场模拟物理瓦解与消除过程'
                )
            ),
            error && h('div', { style: { padding:'0.75rem 1rem', background:'rgba(239,68,68,0.08)', border:'1px solid rgba(239,68,68,0.2)', borderRadius:14, color:'#f87171', fontSize:'0.8rem', display:'flex', alignItems:'center', gap:'0.5rem', textAlign:'left', width:'100%' } },
                '⚠ ', error
            ),
            h('div', { style: { width:'100%', display:'flex', flexDirection:'column', gap:'0.75rem' } },
                h('button', { onClick: onCamera, style: { width:'100%', padding:'1.2rem', background:'#2563eb', color:'#fff', borderRadius:18, fontSize:'1.1rem', fontWeight:800, fontFamily:'inherit', letterSpacing:'-0.02em', boxShadow:'0 20px 60px rgba(37,99,235,0.35)' } },
                    '立即开启扫描仪'
                ),
                h('button', { onClick: () => fileRef.current.click(), style: { width:'100%', padding:'1rem', background:'#0f172a', border:'1px solid #1e293b', color:'#94a3b8', borderRadius:18, fontSize:'0.9rem', fontWeight:700, fontFamily:'inherit', display:'flex', alignItems:'center', justifyContent:'center', gap:'0.5rem' } },
                    h('svg', { width:18, height:18, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:2, strokeLinecap:'round', strokeLinejoin:'round' },
                        h('polyline', { points:'16 16 12 12 8 16' }),
                        h('line', { x1:12, y1:12, x2:12, y2:21 }),
                        h('path', { d:'M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3' })
                    ),
                    '载入分析样本'
                )
            ),
            h('input', { type:'file', ref:fileRef, style:{display:'none'}, accept:'image/*',
                onChange: e => {
                    const file = e.target.files[0];
                    if (file) { const r = new FileReader(); r.onload = ev => onFile(ev.target.result); r.readAsDataURL(file); }
                }
            })
        );
    }

    function StepCamera({ videoRef, onCapture }) {
        return h('div', { style: { position:'absolute', inset:0, background:'#000' } },
            h('video', { ref: videoRef, autoPlay:true, playsInline:true, muted:true }),
            h('div', { style:{ position:'absolute', inset:0, pointerEvents:'none' } },
                h('div', { className:'scan-border' },
                    h('div', { className:'corner corner-tl' }),
                    h('div', { className:'corner corner-tr' }),
                    h('div', { className:'corner corner-bl' }),
                    h('div', { className:'corner corner-br' }),
                    h('div', { className:'scan-bar animate-scan' })
                )
            ),
            h('div', { style:{ position:'absolute', top:56, left:0, right:0, display:'flex', justifyContent:'center' } },
                h('span', { style:{ padding:'4px 14px', background:'rgba(37,99,235,0.15)', border:'1px solid rgba(37,99,235,0.3)', borderRadius:999, color:'#93c5fd', fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.1em' } },
                    'SCANNING...'
                )
            ),
            h('div', { style:{ position:'absolute', bottom:60, left:0, right:0, display:'flex', justifyContent:'center' } },
                h('button', { onClick: onCapture, style:{ width:76, height:76, borderRadius:'50%', background:'#fff', border:'6px solid #0f172a', boxShadow:'0 0 0 2px #fff', display:'flex', alignItems:'center', justifyContent:'center' } },
                    h('div', { style:{ width:60, height:60, borderRadius:'50%', border:'2px solid #cbd5e1' } })
                )
            )
        );
    }

    function StepTarget({ image, targetPoint, setTargetPoint, step, cleaningProgress, onActivate, onNext }) {
        const particles = Array.from({ length: 10 }, (_, i) => {
            const angle = (i / 10) * Math.PI * 2;
            const dist = 80 + Math.random() * 80;
            return { sx: Math.cos(angle) * dist + 'px', sy: Math.sin(angle) * dist + 'px', delay: i * 0.09 };
        });

        return h('div', {
            style: { position:'absolute', inset:0, cursor: step === 2 ? 'crosshair' : 'default' },
            onClick: e => {
                if (step !== 2) return;
                const rect = e.currentTarget.getBoundingClientRect();
                setTargetPoint({ x: ((e.clientX - rect.left) / rect.width) * 100, y: ((e.clientY - rect.top) / rect.height) * 100 });
            }
        },
            h('img', { src: image, style:{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', filter:'brightness(0.55) saturate(0.5)' } }),
            h('img', { src: image, style:{
                position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover',
                filter:'brightness(1.15) saturate(1.3)',
                clipPath: step === 3 ? `circle(${cleaningProgress * 1.6}% at ${targetPoint.x}% ${targetPoint.y}%)` : 'circle(0% at 50% 50%)',
                transition: 'clip-path 0.15s ease'
            }}),
            h('div', { style:{ position:'absolute', transform:'translate(-50%,-50%)', left:`${targetPoint.x}%`, top:`${targetPoint.y}%` } },
                h('div', { style:{ width:72, height:72, borderRadius:'50%', border:'1.5px solid rgba(255,255,255,0.35)', display:'flex', alignItems:'center', justifyContent:'center', position:'relative' } },
                    h('div', { style:{ width:8, height:8, borderRadius:'50%', background:'#22d3ee', boxShadow:'0 0 12px #22d3ee' } }),
                    step === 3 && cleaningProgress < 100 && h('div', { className:'ripple-effect', style:{ width:140, height:140 } }),
                    step === 3 && cleaningProgress < 100 && particles.map((p, i) =>
                        h('div', { key:i, className:'particle', style:{ '--sx':p.sx, '--sy':p.sy, animationDelay:`${p.delay}s` } })
                    )
                )
            ),
            h('div', { style:{ position:'absolute', bottom:0, left:0, right:0, padding:'2rem 2rem 2.5rem', background:'linear-gradient(to top, #020617 0%, rgba(2,6,23,0.85) 60%, transparent 100%)' } },
                step === 2
                    ? h('div', { style:{ display:'flex', flexDirection:'column', gap:'1rem' } },
                        h('div', { style:{ display:'flex', alignItems:'center', gap:'0.6rem', padding:'0.65rem 1rem', background:'rgba(6,182,212,0.08)', border:'1px solid rgba(6,182,212,0.2)', borderRadius:12, color:'#22d3ee', fontSize:'0.82rem', fontWeight:700 } },
                            '⊕ 点击污渍中心点进行靶向定位'
                        ),
                        h('button', { onClick: onActivate, style:{ width:'100%', padding:'1.2rem', background:'#06b6d4', color:'#020617', borderRadius:18, fontSize:'1.1rem', fontWeight:800, fontFamily:'inherit', letterSpacing:'-0.02em', boxShadow:'0 16px 48px rgba(6,182,212,0.3)' } },
                            '启动分子级瓦解'
                        )
                    )
                    : h('div', { style:{ display:'flex', flexDirection:'column', gap:'1rem' } },
                        h('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'flex-end' } },
                            h('span', { style:{ fontWeight:800, fontSize:'0.85rem', textTransform:'uppercase', letterSpacing:'0.05em', color: cleaningProgress >= 100 ? '#34d399' : '#22d3ee' } },
                                cleaningProgress >= 100 ? '✓ 100% Fully Restored' : 'Eliminating Stains...'
                            ),
                            h('span', { className:'mono', style:{ fontSize:'2rem', fontWeight:700, color:'#fff', lineHeight:1 } }, cleaningProgress + '%')
                        ),
                        h('div', { style:{ height:10, background:'rgba(255,255,255,0.06)', borderRadius:999, overflow:'hidden', border:'1px solid rgba(255,255,255,0.08)', padding:2 } },
                            h('div', { className:'progress-bar', style:{ width:`${cleaningProgress}%` } })
                        ),
                        cleaningProgress >= 100 && h('button', { onClick: onNext, className:'bounce-in', style:{ width:'100%', marginTop:'0.5rem', padding:'1.2rem', background:'#fff', color:'#020617', borderRadius:18, fontSize:'1.1rem', fontWeight:800, fontFamily:'inherit', letterSpacing:'-0.02em', boxShadow:'0 20px 60px rgba(255,255,255,0.15)' } },
                            '查看商机分析报告 →'
                        )
                    )
            )
        );
    }

    function StepReport({ onReset }) {
        return h('div', { style:{ position:'absolute', inset:0, background:'#020617', overflowY:'auto', display:'flex', flexDirection:'column' } },
            h('div', { style:{ padding:'5rem 1.5rem 8rem', display:'flex', flexDirection:'column', gap:'1.5rem' } },
                h('div', { style:{ textAlign:'center' } },
                    h('p', { style:{ margin:0, fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.15em', color:'#475569', textTransform:'uppercase' } }, 'Business Intelligence'),
                    h('h2', { style:{ margin:'0.4rem 0 0', fontSize:'2rem', fontWeight:800, textTransform:'uppercase', letterSpacing:'-0.03em', color:'#3b82f6' } }, '商业数据转换')
                ),
                ...businessScenarios.map((item, idx) =>
                    h('div', { key:idx, className:'float-up', style:{ animationDelay:`${idx*0.12}s`, position:'relative', background:'#0f172a', border:'1px solid #1e293b', borderRadius:22, padding:'1.5rem', boxShadow:`0 0 40px ${item.accent}18` } },
                        h('div', { style:{ position:'absolute', top:-10, right:12, padding:'3px 10px', background:item.accent, borderRadius:8, fontSize:'0.65rem', fontWeight:800, letterSpacing:'0.1em', transform:'rotate(2deg)' } }, item.tag),
                        h('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', paddingBottom:'0.75rem', borderBottom:'1px solid rgba(255,255,255,0.05)', marginBottom:'0.75rem' } },
                            h('span', { style:{ fontWeight:800, fontSize:'1rem', textTransform:'uppercase' } }, item.title),
                            h('span', { style:{ color:'#34d399', fontWeight:800, fontSize:'0.85rem' } }, '毛利 ' + item.margin)
                        ),
                        h('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'flex-end' } },
                            h('div', null,
                                h('p', { style:{ margin:0, color:'#475569', fontSize:'0.65rem', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.08em' } }, '市场零售价'),
                                h('p', { className:'mono', style:{ margin:'0.2rem 0 0', fontSize:'1.8rem', fontWeight:700, color:item.accent } }, '¥ ' + item.srp.toFixed(2))
                            ),
                            h('div', { style:{ textAlign:'right' } },
                                h('p', { style:{ margin:0, color:'#475569', fontSize:'0.65rem', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.08em' } }, '渠道进价'),
                                h('p', { className:'mono', style:{ margin:'0.2rem 0 0', fontSize:'1.1rem', fontWeight:700, color:'#334155' } }, '¥ ' + item.cost.toFixed(2))
                            )
                        )
                    )
                ),
                h('button', { onClick: onReset, style:{ display:'flex', alignItems:'center', gap:'0.4rem', color:'#475569', background:'none', fontFamily:'inherit', fontSize:'0.85rem', fontWeight:700, padding:'0.75rem', margin:'0 auto' } },
                    '↺ 重新进行其他样本测试'
                )
            ),
            h('div', { style:{ position:'fixed', bottom:0, left:'50%', transform:'translateX(-50%)', width:'100%', maxWidth:448, padding:'1.5rem', background:'linear-gradient(to top, #020617 50%, transparent)' } },
                h('button', { style:{ width:'100%', padding:'1.2rem', background:'linear-gradient(135deg, #2563eb, #4f46e5)', color:'#fff', borderRadius:18, fontSize:'1rem', fontWeight:800, fontFamily:'inherit', letterSpacing:'-0.02em', boxShadow:'0 16px 48px rgba(37,99,235,0.4)' } },
                    '锁定专利配方 & 立即订购'
                )
            )
        );
    }

    function App() {
        const [step, setStep] = useState(0);
        const [stream, setStream] = useState(null);
        const [capturedImage, setCapturedImage] = useState(null);
        const [targetPoint, setTargetPoint] = useState({ x: 50, y: 50 });
        const [cleaningProgress, setCleaningProgress] = useState(0);
        const [error, setError] = useState(null);

        const videoRef = useRef(null);
        const canvasRef = useRef(null);
        const fileRef = useRef(null);

        useEffect(() => {
            if (step === 1 && stream && videoRef.current) {
                videoRef.current.srcObject = stream;
            }
        }, [step, stream]);

        useEffect(() => {
            if (step !== 3) return;
            setCleaningProgress(0);
            const timer = setInterval(() => {
                setCleaningProgress(p => { if (p >= 100) { clearInterval(timer); return 100; } return p + 1; });
            }, 35);
            return () => clearInterval(timer);
        }, [step]);

        const startCamera = async () => {
            setError(null);
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false });
                setStream(s); setStep(1);
            } catch { setError('无法启动相机，请确保 HTTPS 环境并授予权限。'); }
        };

        const takePhoto = () => {
            const v = videoRef.current, c = canvasRef.current;
            if (!v || !c) return;
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            setCapturedImage(c.toDataURL('image/png'));
            if (stream) stream.getTracks().forEach(t => t.stop());
            setStream(null);
            setStep(2);
        };

        const reset = () => {
            if (stream) stream.getTracks().forEach(t => t.stop());
            setStep(0); setStream(null); setCapturedImage(null); setCleaningProgress(0); setError(null);
        };

        return h('div', { style:{ minHeight:'100dvh', background:'#020617', color:'#fff', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' } },
            h('div', { style:{ position:'fixed', top:0, left:0, right:0, zIndex:50, display:'flex', justifyContent:'center' } },
                h('div', { style:{ width:'100%', maxWidth:448, padding:'0.875rem 1rem', display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:'1px solid rgba(255,255,255,0.07)', background:'rgba(2,6,23,0.8)', backdropFilter:'blur(12px)' } },
                    h('div', { style:{ display:'flex', alignItems:'center', gap:'0.6rem' } },
                        h('div', { style:{ width:34, height:34, background:'#2563eb', borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center' } },
                            h('svg', { width:16, height:16, viewBox:'0 0 24 24', fill:'none', stroke:'#fff', strokeWidth:2.5, strokeLinecap:'round', strokeLinejoin:'round' },
                                h('polygon', { points:'13 2 3 14 12 14 11 22 21 10 12 10 13 2' })
                            )
                        ),
                        h('div', null,
                            h('p', { style:{ margin:0, fontSize:'0.75rem', fontWeight:800, fontStyle:'italic', textTransform:'uppercase', letterSpacing:'-0.02em', color:'#60a5fa', lineHeight:1 } }, 'ZONE 02 — AR LAB'),
                            h('p', { style:{ margin:0, fontSize:'0.6rem', fontWeight:700, color:'rgba(255,255,255,0.3)', letterSpacing:'0.06em' } }, 'MOLECULAR TARGETED LAB')
                        )
                    ),
                    h('div', { style:{ display:'flex', gap:5, alignItems:'center' } },
                        ...[1,2,3,4].map(i =>
                            h('div', { key:i, style:{ height:5, borderRadius:999, background: step >= i ? '#3b82f6' : '#1e293b', width: step >= i ? 20 : 6, transition:'all 0.4s ease' } })
                        )
                    )
                )
            ),
            h('main', { style:{ position:'relative', width:'100%', maxWidth:448, aspectRatio:'9/16', background:'#0f172a', overflow:'hidden', borderLeft:'1px solid #1e293b', borderRight:'1px solid #1e293b' } },
                step === 0 && h(StepWelcome, { onCamera: startCamera, onFile: img => { setCapturedImage(img); setStep(2); }, error, fileRef }),
                step === 1 && h(StepCamera, { videoRef, onCapture: takePhoto }),
                (step === 2 || step === 3) && h(StepTarget, {
                    image: capturedImage, targetPoint, setTargetPoint, step, cleaningProgress,
                    onActivate: () => setStep(3), onNext: () => setStep(4)
                }),
                step === 4 && h(StepReport, { onReset: reset }),
                h('canvas', { ref: canvasRef, style:{ display:'none' } })
            )
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
    </script>
</body>
</html>
